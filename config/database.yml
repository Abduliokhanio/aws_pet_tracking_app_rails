# config/database.yml
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  # you can hard‑code values for local dev, or use ENV vars:
  username: <%= ENV.fetch("PG_USERNAME") { "postgres" } %>
  password: <%= ENV["PG_PASSWORD"] %>
  host:     <%= ENV.fetch("PG_HOST") { "localhost" } %>
  port:     <%= ENV.fetch("PG_PORT") { 5432 } %>

development:
  <<: *default
  database: aws_pet_tracking_app_development

test:
  <<: *default
  database: aws_pet_tracking_app_test

production:
  primary:
    <<: *default
    database: <%= ENV["PG_DATABASE"] %>
    # production credentials usually come from ENV as well
    username: <%= ENV["PG_USERNAME"] %>
    password: <%= ENV["PG_PASSWORD"] %>
    host:     <%= ENV["PG_HOST"] %>
    port:     <%= ENV.fetch("PG_PORT", 5432) %>

  cable:
    <<: *default
    database: <%= ENV["PG_DATABASE"] %>
    username: <%= ENV["PG_USERNAME"] %>
    password: <%= ENV["PG_PASSWORD"] %>
    host:     <%= ENV["PG_HOST"] %>
    port:     <%= ENV.fetch("PG_PORT", 5432) %>
  
  queue:
    <<: *default
    database: <%= ENV["PG_DATABASE"] %>
    username: <%= ENV["PG_USERNAME"] %>
    password: <%= ENV["PG_PASSWORD"] %>
    host:     <%= ENV["PG_HOST"] %>
    port:     <%= ENV.fetch("PG_PORT", 5432) %>
  
  cache:
    <<: *default
    database: <%= ENV["PG_DATABASE"] %>
    username: <%= ENV["PG_USERNAME"] %>
    password: <%= ENV["PG_PASSWORD"] %>
    host:     <%= ENV["PG_HOST"] %>
    port:     <%= ENV.fetch("PG_PORT", 5432) %>