<!DOCTYPE html>
<html>
<head>
  <title>SMS Opt-In</title>
</head>
<body>
  <h1>Pet Tracking SMS Opt-In</h1>

  <p>
    Users may provide their phone number within the application to receive
    transactional SMS notifications related to pet activity, including check-ins,
    alerts, reminders, and status updates.
  </p>

  <form>
    <label>Phone Number:</label>
    <input type="text" placeholder="+1 (555) 555-5555">

    <br><br>

    <input type="checkbox">
    <label>
      I agree to receive SMS notifications related to pet tracking activity.
      Message frequency may vary. Message and data rates may apply.
      Reply STOP to opt out and HELP for assistance.
    </label>

    <br><br>

    <button>Submit</button>
  </form>
</body>
</html>
